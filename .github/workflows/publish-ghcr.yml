name: Release

on:
  push:
    tags:
      - '*'

permissions:
  contents: write   # create GitHub releases + upload assets
  packages: write   # push to GHCR
  id-token: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/k2s-download-manager

jobs:

  # ── Windows: WinForms zip + CLI win-x64 zip ──────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Prepare settings.json
        shell: pwsh
        run: Copy-Item K2sDownloaderWinForms\settings.json.default K2sDownloaderWinForms\settings.json

      - name: Publish WinForms (win-x64 self-contained single-file)
        run: >
          dotnet publish K2sDownloaderWinForms/K2sDownloaderWinForms.csproj
          -c Release -r win-x64 --self-contained
          -p:PublishSingleFile=true
          -p:DebugType=none -p:DebugSymbols=false
          -o publish/winforms

      - name: Publish CLI (win-x64 self-contained single-file)
        run: >
          dotnet publish K2sDownloaderCLI/K2sDownloaderCLI.csproj
          -c Release -r win-x64 --self-contained
          -p:PublishSingleFile=true
          -p:DebugType=none -p:DebugSymbols=false
          -o publish/cli-win

      - name: Zip WinForms
        shell: pwsh
        run: Compress-Archive -Path publish/winforms/* -DestinationPath K2sDownloaderWinForms-win-x64.zip

      - name: Zip CLI win-x64
        shell: pwsh
        run: Compress-Archive -Path publish/cli-win/k2s-cli.exe -DestinationPath k2s-cli-win-x64.zip

      - uses: actions/upload-artifact@v4
        with:
          name: windows-artifacts
          path: |
            K2sDownloaderWinForms-win-x64.zip
            k2s-cli-win-x64.zip

  # ── Linux: CLI linux-x64 zip ─────────────────────────────────────────────────
  build-linux-cli:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Prepare settings.json
        run: cp K2sDownloaderWinForms/settings.json.default K2sDownloaderWinForms/settings.json

      - name: Publish CLI (linux-x64 self-contained single-file)
        run: >
          dotnet publish K2sDownloaderCLI/K2sDownloaderCLI.csproj
          -c Release -r linux-x64 --self-contained
          -p:PublishSingleFile=true
          -p:DebugType=none -p:DebugSymbols=false
          -o publish/cli-linux

      - name: Zip CLI linux-x64
        run: zip -j k2s-cli-linux-x64.zip publish/cli-linux/k2s-cli

      - uses: actions/upload-artifact@v4
        with:
          name: linux-artifacts
          path: k2s-cli-linux-x64.zip

  # ── Docker: build & push to GHCR ─────────────────────────────────────────────
  build-docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v2
      - uses: docker/setup-buildx-action@v2

      - name: Log in to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.ref_name }}
            ${{ env.IMAGE_NAME }}:latest

  # ── GitHub Release: attach all artifacts ─────────────────────────────────────
  create-release:
    needs: [build-windows, build-linux-cli, build-docker]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: windows-artifacts

      - uses: actions/download-artifact@v4
        with:
          name: linux-artifacts

      - name: Generate release notes file
        run: |
          cat > notes.md << 'NOTES'
          ## 下載說明

          | 檔案 | 說明 |
          |------|------|
          | `K2sDownloaderWinForms-win-x64.zip` | Windows 桌面程式（免安裝，解壓縮後執行 `.exe`） |
          | `k2s-cli-win-x64.zip` | Windows CLI 工具 |
          | `k2s-cli-linux-x64.zip` | Linux CLI 工具 |

          Docker Image 已推送至 GHCR：
          ```
          ghcr.io/${{ github.repository_owner }}/k2s-download-manager:${{ github.ref_name }}
          ```

          ## 快速安裝（Docker）

          ```bash
          docker run -d \
            --name k2s-downloader \
            --restart unless-stopped \
            -p 5000:5000 \
            -v ~/k2s-data:/data \
            ghcr.io/${{ github.repository_owner }}/k2s-download-manager:${{ github.ref_name }}
          ```

          開啟瀏覽器：`http://YOUR_IP:5000`

          ## 更新紀錄

          NOTES

          # Append auto-generated commit log since last tag
          gh api repos/${{ github.repository }}/releases/generate-notes \
            -f tag_name="${{ github.ref_name }}" \
            --jq '.body' >> notes.md || true

        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --notes-file notes.md \
            K2sDownloaderWinForms-win-x64.zip \
            k2s-cli-win-x64.zip \
            k2s-cli-linux-x64.zip
